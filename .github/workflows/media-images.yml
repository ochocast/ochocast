name: Build media service images

on:
  pull_request:
    branches:
      - main
    paths:
      - ".github/workflows/media-images.yml"
      - "liveRecoder/**"
      - "sfuServer/**"
  push:
    branches:
      - main
    paths:
      - ".github/workflows/media-images.yml"
      - "liveRecoder/**"
      - "sfuServer/**"
  workflow_dispatch:
    inputs:
      component:
        description: Media component to build
        required: true
        default: all
        type: choice
        options:
          - all
          - live-recorder
          - sfu-controlplane
          - sfu-worker
      dry_run:
        description: Build without pushing images
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  LIVE_RECORDER_REGISTRY_ENDPOINT: rg.fr-par.scw.cloud/live-recorder-images
  LIVE_RECORDER_IMAGE_REPOSITORY: rg.fr-par.scw.cloud/live-recorder-images/live-recorder
  SFU_REGISTRY_ENDPOINT: rg.fr-par.scw.cloud/sfu-server
  SFU_CONTROLPLANE_IMAGE_REPOSITORY: rg.fr-par.scw.cloud/sfu-server/controlplane
  SFU_WORKER_IMAGE_REPOSITORY: rg.fr-par.scw.cloud/sfu-server/sfu

jobs:
  metadata:
    name: Resolve immutable image tag
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      push_images: ${{ steps.mode.outputs.push_images }}
      build_live_recorder: ${{ steps.components.outputs.live_recorder }}
      build_sfu_controlplane: ${{ steps.components.outputs.sfu_controlplane }}
      build_sfu_worker: ${{ steps.components.outputs.sfu_worker }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - name: Resolve image tag
        id: meta
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "image_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
      - name: Resolve push mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ] || [ "${{ inputs.dry_run || 'false' }}" = "true" ]; then
            echo "push_images=false" >> "$GITHUB_OUTPUT"
          else
            echo "push_images=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve components
        id: components
        run: |
          component="${{ inputs.component || 'all' }}"

          live_recorder=false
          sfu_controlplane=false
          sfu_worker=false

          case "$component" in
            all)
              live_recorder=true
              sfu_controlplane=true
              sfu_worker=true
              ;;
            live-recorder)
              live_recorder=true
              ;;
            sfu-controlplane)
              sfu_controlplane=true
              ;;
            sfu-worker)
              sfu_worker=true
              ;;
          esac

          echo "live_recorder=$live_recorder" >> "$GITHUB_OUTPUT"
          echo "sfu_controlplane=$sfu_controlplane" >> "$GITHUB_OUTPUT"
          echo "sfu_worker=$sfu_worker" >> "$GITHUB_OUTPUT"

  build-live-recorder:
    name: Build live-recorder image
    runs-on: ubuntu-latest
    needs: metadata
    if: needs.metadata.outputs.build_live_recorder == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0
      - name: Docker Login
        if: needs.metadata.outputs.push_images == 'true'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.LIVE_RECORDER_REGISTRY_ENDPOINT }}
          username: ${{ secrets.SCW_REG_USER }}
          password: ${{ secrets.SCW_SECRET_KEY }}
      - name: Build and push live-recorder image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./liveRecoder
          push: ${{ needs.metadata.outputs.push_images == 'true' }}
          tags: |
            ${{ env.LIVE_RECORDER_IMAGE_REPOSITORY }}:${{ needs.metadata.outputs.image_tag }}

  build-sfu-controlplane:
    name: Build SFU control-plane image
    runs-on: ubuntu-latest
    needs: metadata
    if: needs.metadata.outputs.build_sfu_controlplane == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0
      - name: Docker Login
        if: needs.metadata.outputs.push_images == 'true'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.SFU_REGISTRY_ENDPOINT }}
          username: ${{ secrets.SCW_REG_USER }}
          password: ${{ secrets.SCW_SECRET_KEY }}
      - name: Build and push SFU control-plane image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./sfuServer
          file: ./sfuServer/Dockerfile.controlplane
          push: ${{ needs.metadata.outputs.push_images == 'true' }}
          tags: |
            ${{ env.SFU_CONTROLPLANE_IMAGE_REPOSITORY }}:${{ needs.metadata.outputs.image_tag }}

  build-sfu-worker:
    name: Build SFU worker image
    runs-on: ubuntu-latest
    needs: metadata
    if: needs.metadata.outputs.build_sfu_worker == 'true'
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0
      - name: Docker Login
        if: needs.metadata.outputs.push_images == 'true'
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ env.SFU_REGISTRY_ENDPOINT }}
          username: ${{ secrets.SCW_REG_USER }}
          password: ${{ secrets.SCW_SECRET_KEY }}
      - name: Build and push SFU worker image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./sfuServer
          file: ./sfuServer/Dockerfile.sfu
          push: ${{ needs.metadata.outputs.push_images == 'true' }}
          tags: |
            ${{ env.SFU_WORKER_IMAGE_REPOSITORY }}:${{ needs.metadata.outputs.image_tag }}
