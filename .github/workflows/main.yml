name: Build images and propose GitOps promotion

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment to promote through ops-architecture-lab
        required: true
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read

env:
  FRONTEND_IMAGE_REPOSITORY: rg.fr-par.scw.cloud/frontend-images/ochocast-frontend
  BACKEND_IMAGE_REPOSITORY: rg.fr-par.scw.cloud/backend-images/octocast-backend
  OPS_REPOSITORY: ochocast/ops-architecture-lab
  OPS_BASE_BRANCH: ${{ vars.OPS_REPO_BASE_BRANCH || 'main' }}

jobs:
  validate-frontend:
    name: Validate frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js 18
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npx eslint src --ext .js,.jsx,.ts,.tsx --max-warnings=0
      - name: Build
        run: npm run build

  validate-backend:
    name: Validate backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: backend/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Compile TypeScript
        run: npx tsc --noEmit
      - name: Run unit tests
        run: npm test

  build-and-push:
    name: Build and push immutable images
    runs-on: ubuntu-latest
    needs:
      - validate-frontend
      - validate-backend
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      target_environment: ${{ steps.target.outputs.environment }}
      values_file: ${{ steps.target.outputs.values_file }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Resolve target environment
        id: target
        run: |
          target="${{ inputs.environment || 'staging' }}"
          if [ "$target" = "production" ]; then
            echo "environment=production" >> "$GITHUB_OUTPUT"
            echo "values_file=kubernetes/ochocast-webapp/values-prod.yaml" >> "$GITHUB_OUTPUT"
          else
            echo "environment=staging" >> "$GITHUB_OUTPUT"
            echo "values_file=kubernetes/ochocast-webapp/values-staging.yaml" >> "$GITHUB_OUTPUT"
          fi
      - name: Resolve image tag
        id: meta
        run: |
          short_sha="$(git rev-parse --short=12 HEAD)"
          echo "image_tag=sha-${short_sha}" >> "$GITHUB_OUTPUT"
      - name: Docker Setup Buildx
        uses: docker/setup-buildx-action@f95db51fddba0c2d1ec667646a06c2ce06100226 # v3.0.0
      - name: Docker Login
        uses: docker/login-action@343f7c4344506bcbf9b4de18042ae17996df046d # v3.0.0
        with:
          registry: ${{ secrets.SCW_REGISTRY }}
          username: ${{ secrets.SCW_REG_USER }}
          password: ${{ secrets.SCW_SECRET_KEY }}
      - name: Build and push frontend image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.FRONTEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}
      - name: Build and push backend image
        uses: docker/build-push-action@0565240e2d4ab88bba5387d719585280857ece09 # v5.0.0
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ steps.meta.outputs.image_tag }}

  propose-gitops-promotion:
    name: Propose GitOps promotion
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout ops repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          repository: ${{ env.OPS_REPOSITORY }}
          ref: ${{ env.OPS_BASE_BRANCH }}
          token: ${{ secrets.OPS_REPO_TOKEN }}
          path: ops-architecture-lab
      - name: Update Helm image tags
        uses: mikefarah/yq@v4.44.3
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          VALUES_FILE: ops-architecture-lab/${{ needs.build-and-push.outputs.values_file }}
        with:
          cmd: yq -i '.frontend.image.tag = strenv(IMAGE_TAG) | .backend.image.tag = strenv(IMAGE_TAG)' "$VALUES_FILE"
      - name: Create promotion pull request
        uses: peter-evans/create-pull-request@v6
        with:
          path: ops-architecture-lab
          token: ${{ secrets.OPS_REPO_TOKEN }}
          branch: promote/ochocast-${{ needs.build-and-push.outputs.target_environment }}-${{ needs.build-and-push.outputs.image_tag }}
          base: ${{ env.OPS_BASE_BRANCH }}
          commit-message: "promote ochocast ${{ needs.build-and-push.outputs.target_environment }} to ${{ needs.build-and-push.outputs.image_tag }}"
          title: "Promote Ochocast ${{ needs.build-and-push.outputs.target_environment }} to ${{ needs.build-and-push.outputs.image_tag }}"
          body: |
            Automated promotion proposal from ochocast.

            - Source commit: ${{ github.sha }}
            - Target environment: ${{ needs.build-and-push.outputs.target_environment }}
            - Frontend image: `${{ env.FRONTEND_IMAGE_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}`
            - Backend image: `${{ env.BACKEND_IMAGE_REPOSITORY }}:${{ needs.build-and-push.outputs.image_tag }}`

            Deployment remains controlled by ops-architecture-lab and ArgoCD after this PR is reviewed and merged.
          labels: |
            promotion
            ochocast
