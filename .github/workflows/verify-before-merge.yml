name: Check compilation before merging to main

on:
  pull_request:
    branches:
      - main

jobs:
  build-front:
    name: build-front
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js 18.x
        uses: actions/setup-node@v4
        with:
          node-version: "18.x"
          cache: "npm"
          cache-dependency-path: ./frontend
      - run: npm ci
      - run: npm run build --if-present

  build-back:
    name: build-back
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3.0.0

      - name: Build backend Docker image
        uses: docker/build-push-action@v5.0.0
        with:
          context: ./backend
          load: true
          tags: temp-backend:latest

  build-backend-test:
    name: build-backend-test
    runs-on: ubuntu-latest
    needs: build-back
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./backend

      - name: Install dependencie
        run: npm ci

      - name: Check test compilation
        run: npx tsc --noEmit

  run-tests-bakcend:
    name: run-tests-bakcend
    runs-on: ubuntu-latest
    needs: build-backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./backend

      - name: Install dependencie
        run: npm ci

      - name: Compile TypeScript
        run: npx tsc --noEmit

      - name: Run unit tests
        run: |
          npm test
