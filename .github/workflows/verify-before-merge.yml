name: Check compilation before merging to main

on:
  pull_request:
    branches:
      - main

jobs:
  lint:
    name: lint
    # Empêche l'exécution pour les branches commençant par renovate/
    if: ${{ !startsWith(github.head_ref, 'renovate/') }}
    runs-on: self-hosted
    defaults:
      run:
        working-directory: .
    steps:
      - name: Force clean postgres-data and minio run_env
        run: docker run --rm -v $GITHUB_WORKSPACE:/workspace alpine rm -rf /workspace/dev-tools/database/postgres-data /workspace/dev-tools/localMinio/run_env || true
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Show working directory
        run: pwd
      - name: Debug — list files
        run: ls -la
      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: "npm"
      - name: Install dependencies (root)
        run: npm ci
      - name: Run ESLint on frontend
        run: npx eslint "frontend/**/*.{js,jsx,ts,tsx}"
      - name: Run Prettier check on frontend and backend
        run: npx prettier --check "frontend/**/*.{js,jsx,ts,tsx}" "backend/**/*.{js,jsx,ts,tsx}"

  build-front:
    name: build-front
    if: ${{ !startsWith(github.head_ref, 'renovate/') }}
    runs-on: self-hosted
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Force clean postgres-data and minio run_env
        run: docker run --rm -v $GITHUB_WORKSPACE:/workspace alpine rm -rf /workspace/dev-tools/database/postgres-data /workspace/dev-tools/localMinio/run_env || true
        working-directory: .
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js 20.x
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20.x"
          cache: "npm"
          cache-dependency-path: ./frontend/package-lock.json
      - run: npm ci
      - run: npm run build --if-present

  build-back:
    name: build-back
    if: ${{ !startsWith(github.head_ref, 'renovate/') }}
    runs-on: self-hosted
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Force clean postgres-data and minio run_env
        run: docker run --rm -v $GITHUB_WORKSPACE:/workspace alpine rm -rf /workspace/dev-tools/database/postgres-data /workspace/dev-tools/localMinio/run_env || true
        working-directory: .
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Build backend Docker image
        run: docker build -t temp-backend:latest .

  build-backend-test:
    name: build-backend-test
    runs-on: self-hosted
    needs: build-back
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Force clean postgres-data and minio run_env
        run: docker run --rm -v $GITHUB_WORKSPACE:/workspace alpine rm -rf /workspace/dev-tools/database/postgres-data /workspace/dev-tools/localMinio/run_env || true
        working-directory: .
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./backend
      - name: Install dependencie
        run: npm ci
      - name: Check test compilation
        run: npx tsc --noEmit

  run-tests-bakcend:
    name: run-tests-bakcend
    runs-on: self-hosted
    needs: build-backend-test
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Force clean postgres-data and minio run_env
        run: docker run --rm -v $GITHUB_WORKSPACE:/workspace alpine rm -rf /workspace/dev-tools/database/postgres-data /workspace/dev-tools/localMinio/run_env || true
        working-directory: .
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Use Node.js 20
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ./backend
      - name: Install dependencie
        run: npm ci
      - name: Compile TypeScript
        run: npx tsc --noEmit
      - name: Run unit tests
        run: |
          npm test

  test-sfu-go:
    name: test-sfu-go
    runs-on: self-hosted
    timeout-minutes: 10
    defaults:
      run:
        working-directory: sfuServer
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Set up Go from sfuServer/go.mod
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version-file: sfuServer/go.mod
          cache-dependency-path: sfuServer/go.sum
      - name: Run SFU tests
        run: go test ./...
      - name: Run SFU vet
        run: go vet ./...
