# Configuration example pour le benchmark distribué
# Copier ce fichier en config.yaml et adapter à votre environnement

# Liste des machines workers (ajouter autant que nécessaire)
workers:
  - ip: "192.168.1.10"    # Remplacer par l'IP réelle du worker 1
    port: 8080
    enabled: true
  - ip: "192.168.1.11"    # Remplacer par l'IP réelle du worker 2
    port: 8080
    enabled: true
  # Ajouter d'autres workers ici
  # - ip: "192.168.1.12"
  #   port: 8080
  #   enabled: true

# Configuration du serveur SFU
sfu:
  url: "http://localhost:8090"      # URL du serveur SFU
  whip_endpoint: "/whip"             # Endpoint WHIP pour le publisher
  viewer_endpoint: "/viewer"         # Endpoint pour les viewers
  stun_url: "stun:stun.l.google.com:19302"  # Serveur STUN

# Configuration du benchmark
benchmark:
  total_viewers: 10                  # Nombre total de viewers (sera distribué équitablement)
  duration: 60                       # Durée du test en secondes
  red_interval: 3.0                  # Intervalle entre les frames rouges (secondes)
  red_threshold: 128.0               # Seuil de détection des frames rouges (0-255)
  
  # Configuration du host (streaming)
  host:
    width: 640                       # Largeur de la vidéo
    height: 360                      # Hauteur de la vidéo
    fps: 30                          # Images par seconde
    token: null                      # Token d'authentification (null si non utilisé)

# Configuration de la collecte des métriques
metrics:
  collection_interval: 5             # Fréquence de collecte des métriques (secondes)
  output_dir: "./distributed_benchmark_data"  # Dossier de sortie

# Configuration de la synchronisation
sync:
  ntp_check: true                    # Vérifier la synchronisation NTP
  max_time_drift: 1.0                # Dérive temporelle maximale acceptée (secondes)
  startup_delay: 10                  # Délai avant démarrage des viewers (secondes)
  
# Configuration réseau
network:
  timeout: 30                        # Timeout pour les requêtes HTTP (secondes)
  retry_attempts: 3                  # Nombre de tentatives en cas d'échec
  retry_delay: 2                     # Délai entre les tentatives (secondes)
