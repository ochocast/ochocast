# Configuration pour le benchmark distribué

# Liste des machines workers
workers:
  - ip: "localhost"
    port: 8080
    enabled: true
  - ip: "localhost"
    port: 8081
    enabled: true
  # Ajouter d'autres workers ici
  # - ip: "10.0.0.4"
  #   port: 8080
  #   enabled: true

# Configuration du serveur SFU
sfu:
  url: "http://localhost:8090"
  whip_endpoint: "/whip"
  viewer_endpoint: "/viewer"
  stun_url: "stun:stun.l.google.com:19302"

# Configuration du benchmark
benchmark:
  total_viewers: 10               # Nombre total de viewers à distribuer
  duration: 300                   # Durée du test en secondes (après démarrage latency check)
  red_interval: 3.0               # Intervalle entre les frames rouges (secondes)
  red_threshold: 128.0            # Seuil de détection des frames rouges
  
  # Configuration du host (streaming)
  host:
    width: 640
    height: 360
    fps: 30
    token: null                    # Token d'authentification (si nécessaire)

# Configuration de la collecte des métriques
metrics:
  collection_interval: 5          # Intervalle de collecte en secondes (pour métriques HTTP legacy)
  output_dir: "./distributed_benchmark_data"  # Dossier de sortie sur le controller
  
  # Configuration de la collecte des métriques système des workers
  system_metrics:
    enabled: true                 # Activer la collecte de métriques système
    interval: 5.0                 # Intervalle de collecte en secondes

# Configuration du WebSocket (reporting en temps réel)
websocket:
  enabled: true                   # Activer le reporting WebSocket
  host: "0.0.0.0"                 # Host du serveur WebSocket sur le Controller
  port: 9000                      # Port du serveur WebSocket
  reconnect_delay: 5.0            # Délai de reconnexion automatique (workers)

# Configuration de la synchronisation
sync:
  ntp_check: true                 # Vérifier la synchronisation NTP
  max_time_drift: 1.0             # Dérive maximale acceptée en secondes
  startup_delay: 10               # Délai avant de démarrer les viewers (secondes)
  
# Configuration réseau
network:
  timeout: 30                     # Timeout pour les requêtes HTTP (secondes)
  retry_attempts: 3               # Nombre de tentatives en cas d'échec
  retry_delay: 2                  # Délai entre les tentatives (secondes)
