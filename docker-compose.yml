services:
  auth:
    extends:
      file: ./localKeycloak/docker-compose.yml
      service: auth

  minio:
    extends:
      file: ./localMinio/docker-compose.yml
      service: minio

  postgres:
    extends:
      file: ./database/docker-compose.yml
      service: postgres

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ochocast-rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ochocast

  ffmpeg-worker:
    build:
      context: ./ffmpegServer
      dockerfile: Dockerfile
    environment:
      - MINIO_ENDPOINT=minio
      - MINIO_PORT=9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin
      - MINIO_USE_SSL=false
      - STOCK_MEDIA_BUCKET=media
      - STOCK_MINIATURE_BUCKET=miniature
      - RABBITMQ_URL=amqp://admin:admin@rabbitmq:5672
      - VIDEO_QUEUE_NAME=video-transcoding-queue
      - WORKER_CONCURRENCY=2
      - LOG_LEVEL=info
    depends_on:
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - ochocast
      - default
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 1G

volumes:
  rabbitmq_data:

networks:
  ochocast:
    driver: bridge

