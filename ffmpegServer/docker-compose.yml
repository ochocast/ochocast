services:
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: ochocast-rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-admin}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ochocast

  ffmpeg-worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - MINIO_ENDPOINT=${MINIO_ENDPOINT:-minio}
      - MINIO_PORT=${MINIO_PORT:-9000}
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_USE_SSL=false
      - STOCK_MEDIA_BUCKET=${STOCK_MEDIA_BUCKET:-media}
      - STOCK_MINIATURE_BUCKET=${STOCK_MINIATURE_BUCKET:-miniature}
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-admin}:${RABBITMQ_PASS:-admin}@rabbitmq:5672
      - VIDEO_QUEUE_NAME=${VIDEO_QUEUE_NAME:-video-transcoding-queue}
      - VIDEO_RESULT_QUEUE_NAME=${VIDEO_RESULT_QUEUE_NAME:-video-transcoding-results}
      - WORKER_ID=worker-${WORKER_NUM:-1}
      - WORKER_CONCURRENCY=${WORKER_CONCURRENCY:-1}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - ochocast
    restart: unless-stopped
    deploy:
      replicas: ${WORKER_REPLICAS:-1}
      resources:
        limits:
          cpus: '${WORKER_CPU_LIMIT:-2}'
          memory: ${WORKER_MEMORY_LIMIT:-2G}
        reservations:
          cpus: '${WORKER_CPU_RESERVATION:-1}'
          memory: ${WORKER_MEMORY_RESERVATION:-1G}

volumes:
  rabbitmq_data:

networks:
  ochocast:
    external: true
