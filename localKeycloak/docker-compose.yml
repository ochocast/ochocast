version: "3.9"

services:
  auth:
    image: quay.io/keycloak/keycloak:22.0.4@sha256:20c2bd474f20a3f89b7c652b9c4e5a54701301beddcee7deb00ec88d73cbbab5
    ports:
      - 8080:8080
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KEYCLOAK_IMPORT: /opt/keycloak/data/import/
    restart: unless-stopped
    volumes:
      - ./config/:/opt/keycloak/data/import/
    command: start-dev --import-realm
