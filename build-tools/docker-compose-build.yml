services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: ${DOCKER_HUB_USERNAME}/ochocast-backend:${APP_VERSION:-latest}

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    image: ${DOCKER_HUB_USERNAME}/ochocast-frontend:${APP_VERSION:-latest}

  live-recorder:
    build:
      context: ../liveRecoder
      dockerfile: Dockerfile
    image: ${DOCKER_HUB_USERNAME}/ochocast-live-recorder:${APP_VERSION:?APP_VERSION must be set to an immutable tag}

  sfu-controlplane:
    build:
      context: ../sfuServer
      dockerfile: Dockerfile.controlplane
    image: ${DOCKER_HUB_USERNAME}/ochocast-sfu-controlplane:${APP_VERSION:?APP_VERSION must be set to an immutable tag}

  sfu-server:
    build:
      context: ../sfuServer
      dockerfile: Dockerfile.sfu
    image: ${DOCKER_HUB_USERNAME}/ochocast-sfu-server:${APP_VERSION:?APP_VERSION must be set to an immutable tag}

  ffmpeg-worker:
    build:
      context: ../ffmpegServer
      dockerfile: Dockerfile
    image: ${DOCKER_HUB_USERNAME}/ochocast-ffmpeg-worker:${APP_VERSION:-latest}

  transcript:
    build:
      context: ../ffmpegServer
      dockerfile: Dockerfile.transcript
    image: ${DOCKER_HUB_USERNAME}/ochocast-transcript:${APP_VERSION:-latest}
